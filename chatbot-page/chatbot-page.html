<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Chatbot</title>
    <link rel="stylesheet" href="chatbot-page.css">
</head>

<body>

    <audio id="secretTheme">
            <source src="Chatbot-secret-theme.mp3" type="audio/mpeg">
    </audio>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-info">
                <span class="back-arrow">&#10094;</span>
                <div class="avatar"></div>
                <div>
                    <div class="name">Justin Chatbot</div>
                    <div class="status">online</div>
                </div>
            </div>
            <span class="down-arrow">&#10095;</span>
        </div>

        <div class="chat-messages" id="chat-box-main">
            <div class="date-divider"></div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

    <div class="delete-button" title="delete history"></div>

    <div class="history-overlay">
        <div class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <span class="back-arrow">&#10094;</span>
                    <div class="avatar"></div>
                    <div>
                        <div class="name">Justin Chatbot History</div>
                        <div class="status">online</div>
                    </div>
                </div>
                <span class="down-arrow">&#10095;</span>
            </div>

            <div class="chat-messages" id="chat-box-history">
                <div class="date-divider"></div>
            </div>
        </div>
    </div>

    <script src="node_modules/dayjs/dayjs.min.js"></script>
    <script src="chatbot-structure.js"></script>
    <script src="chatbot-page.js"></script>
</body>

</html>
